<!--
  ╔══════════════════════════════════════════════════════════════╗
  ║  RETELL AI — FLOATING "TALK TO US" BUTTON                    ║
  ║                                                               ║
  ║  Paste this entire block before </body> on any page.         ║
  ║  Update WEBHOOK_URL and RETELL_AGENT_ID below.               ║
  ╚══════════════════════════════════════════════════════════════╝
-->

<div id="retell-fab" style="position:fixed;bottom:24px;right:24px;z-index:99999;font-family:system-ui,sans-serif;">
  <!-- Floating Action Button -->
  <button id="retell-fab-btn" onclick="retellToggle()" style="
    width:60px;height:60px;border-radius:50%;border:none;cursor:pointer;
    background:#6c5ce7;color:#fff;font-size:24px;
    box-shadow:0 4px 20px rgba(108,92,231,0.4);
    display:flex;align-items:center;justify-content:center;
    transition:transform 0.2s,box-shadow 0.2s;
  ">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="#fff">
      <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
    </svg>
  </button>
  <!-- Status pill -->
  <div id="retell-fab-status" style="
    display:none;position:absolute;bottom:70px;right:0;
    background:#1a1a2e;color:#ccc;font-size:12px;
    padding:6px 14px;border-radius:20px;white-space:nowrap;
    box-shadow:0 2px 12px rgba(0,0,0,0.3);
  "></div>
</div>

<script type="module">
import { RetellWebClient } from 'https://esm.sh/retell-client-js-sdk@2.0.7';
(function() {
  // ┌─────────────────────────────────────┐
  // │  UPDATE THESE TWO VALUES            │
  // └─────────────────────────────────────┘
  const WEBHOOK_URL = 'YOUR_WEBHOOK_URL';   // e.g. https://your-n8n.example.com/webhook/retell-proxy
  const RETELL_AGENT_ID = 'YOUR_AGENT_ID';

  let client = null;
  let active = false;
  const btn = document.getElementById('retell-fab-btn');
  const status = document.getElementById('retell-fab-status');

  function showStatus(text, color) {
    status.style.display = 'block';
    status.textContent = text;
    if (color) status.style.background = color;
  }
  function hideStatus() { status.style.display = 'none'; }

  window.retellToggle = async function() {
    if (active) {
      if (client) client.stopCall();
      active = false;
      btn.style.background = '#6c5ce7';
      btn.innerHTML = '<svg width="24" height="24" viewBox="0 0 24 24" fill="#fff"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>';
      showStatus('Call ended', '#1a1a2e');
      setTimeout(hideStatus, 2500);
      return;
    }

    showStatus('Connecting...', '#1a1a2e');
    btn.style.background = '#888';

    try {
      const res = await fetch(WEBHOOK_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({ agent_id: RETELL_AGENT_ID }),
      });
      if (!res.ok) throw new Error('API error ' + res.status);
      const data = await res.json();

      client = new RetellWebClient();

      client.on('call_started', () => {
        active = true;
        btn.style.background = '#e17055';
        btn.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="#fff"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>';
        showStatus('Speaking with agent...', '#00b894');
      });
      client.on('call_ended', () => {
        active = false;
        btn.style.background = '#6c5ce7';
        btn.innerHTML = '<svg width="24" height="24" viewBox="0 0 24 24" fill="#fff"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>';
        showStatus('Call ended', '#1a1a2e');
        setTimeout(hideStatus, 2500);
      });
      client.on('error', (err) => {
        console.error('Retell error:', err);
        showStatus('Error', '#e17055');
        setTimeout(hideStatus, 3000);
      });

      await client.startCall({ accessToken: data.access_token, sampleRate: 24000 });

    } catch (err) {
      console.error('Retell start failed:', err);
      btn.style.background = '#6c5ce7';
      showStatus('Failed to connect', '#e17055');
      setTimeout(hideStatus, 3000);
    }
  };
})();
</script>
