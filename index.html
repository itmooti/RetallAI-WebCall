<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Talk to Our AI Agent</title>

  <!-- Retell Web Client SDK via esm.sh (auto-bundles dependencies) -->
  <script type="module">
    import { RetellWebClient } from 'https://esm.sh/retell-client-js-sdk@2.0.7';
    window.RetellWebClient = RetellWebClient;
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --surface-hover: #1a1a26;
      --border: #1e1e2e;
      --text: #e4e4ed;
      --text-muted: #7a7a8e;
      --accent: #6c5ce7;
      --accent-glow: rgba(108, 92, 231, 0.35);
      --accent-light: #a29bfe;
      --green: #00b894;
      --green-glow: rgba(0, 184, 148, 0.3);
      --red: #e17055;
      --red-glow: rgba(225, 112, 85, 0.3);
      --radius: 16px;
    }

    html, body {
      height: 100%;
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    /* ── Ambient Background ── */
    .ambient {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      overflow: hidden;
    }
    .ambient::before {
      content: '';
      position: absolute;
      width: 600px; height: 600px;
      top: -120px; right: -100px;
      background: radial-gradient(circle, rgba(108,92,231,0.08) 0%, transparent 70%);
      animation: drift 20s ease-in-out infinite alternate;
    }
    .ambient::after {
      content: '';
      position: absolute;
      width: 500px; height: 500px;
      bottom: -100px; left: -80px;
      background: radial-gradient(circle, rgba(0,184,148,0.06) 0%, transparent 70%);
      animation: drift 25s ease-in-out infinite alternate-reverse;
    }
    @keyframes drift {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(40px, -30px) scale(1.1); }
    }

    /* ── Layout ── */
    .container {
      position: relative; z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      padding: 2rem;
    }

    /* ── Setup Panel (shown first) ── */
    .setup-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2.5rem;
      width: 100%;
      max-width: 440px;
      transition: opacity 0.4s, transform 0.4s;
    }
    .setup-panel.hidden {
      opacity: 0;
      transform: translateY(10px);
      pointer-events: none;
      position: absolute;
    }

    .setup-panel h2 {
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--accent-light);
      margin-bottom: 1.5rem;
    }

    .field { margin-bottom: 1.25rem; }
    .field label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 0.4rem;
      letter-spacing: 0.02em;
    }
    .field input {
      width: 100%;
      padding: 0.7rem 1rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 0.82rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .field input:focus {
      border-color: var(--accent);
    }
    .field input::placeholder {
      color: #3a3a4e;
    }
    .field .hint {
      font-size: 0.7rem;
      color: #4a4a5e;
      margin-top: 0.3rem;
    }

    .save-btn {
      width: 100%;
      padding: 0.85rem;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s;
      margin-top: 0.5rem;
    }
    .save-btn:hover {
      background: #5b4bd6;
      box-shadow: 0 0 20px var(--accent-glow);
    }
    .save-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .warning-box {
      background: rgba(225,112,85,0.08);
      border: 1px solid rgba(225,112,85,0.2);
      border-radius: 10px;
      padding: 0.75rem 1rem;
      margin-bottom: 1.25rem;
      font-size: 0.75rem;
      color: var(--red);
      line-height: 1.5;
    }

    /* ── Call Interface ── */
    .call-interface {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      transition: opacity 0.4s, transform 0.4s;
    }
    .call-interface.hidden {
      opacity: 0;
      transform: translateY(10px);
      pointer-events: none;
      position: absolute;
    }

    .agent-info {
      text-align: center;
    }
    .agent-info h1 {
      font-family: 'DM Sans', sans-serif;
      font-size: 1.6rem;
      font-weight: 600;
      margin-bottom: 0.3rem;
    }
    .agent-info p {
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    /* ── Orb ── */
    .orb-container {
      position: relative;
      width: 180px; height: 180px;
      display: flex; align-items: center; justify-content: center;
    }

    .orb-ring {
      position: absolute; inset: 0;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      transition: border-color 0.6s, box-shadow 0.6s;
    }
    .orb-ring.active {
      border-color: var(--green);
      box-shadow: 0 0 40px var(--green-glow), inset 0 0 30px rgba(0,184,148,0.05);
    }

    .orb-pulse {
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 1px solid transparent;
      transition: border-color 0.4s;
    }
    .orb-pulse.active {
      border-color: rgba(0,184,148,0.15);
      animation: pulse-ring 2s ease-out infinite;
    }
    @keyframes pulse-ring {
      0% { transform: scale(1); opacity: 1; }
      100% { transform: scale(1.3); opacity: 0; }
    }

    /* Audio visualizer bars */
    .visualizer {
      display: flex;
      align-items: center;
      gap: 3px;
      height: 48px;
    }
    .visualizer .bar {
      width: 3px;
      background: var(--accent);
      border-radius: 2px;
      height: 8px;
      transition: height 0.08s ease, background 0.4s;
    }
    .visualizer.agent-talking .bar {
      background: var(--green);
      animation: viz-bounce 0.6s ease-in-out infinite alternate;
    }
    .visualizer.agent-talking .bar:nth-child(1) { animation-delay: 0s; }
    .visualizer.agent-talking .bar:nth-child(2) { animation-delay: 0.08s; }
    .visualizer.agent-talking .bar:nth-child(3) { animation-delay: 0.16s; }
    .visualizer.agent-talking .bar:nth-child(4) { animation-delay: 0.24s; }
    .visualizer.agent-talking .bar:nth-child(5) { animation-delay: 0.32s; }
    .visualizer.agent-talking .bar:nth-child(6) { animation-delay: 0.24s; }
    .visualizer.agent-talking .bar:nth-child(7) { animation-delay: 0.16s; }
    .visualizer.agent-talking .bar:nth-child(8) { animation-delay: 0.08s; }
    .visualizer.agent-talking .bar:nth-child(9) { animation-delay: 0s; }

    @keyframes viz-bounce {
      0% { height: 6px; }
      100% { height: 38px; }
    }

    /* ── Status ── */
    .status {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.82rem;
      color: var(--text-muted);
      font-weight: 500;
    }
    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--text-muted);
      transition: background 0.3s, box-shadow 0.3s;
    }
    .status-dot.live {
      background: var(--green);
      box-shadow: 0 0 8px var(--green-glow);
    }

    /* ── Buttons ── */
    .call-btn {
      width: 64px; height: 64px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.2s, box-shadow 0.3s, background 0.3s;
      position: relative;
    }
    .call-btn:active { transform: scale(0.92); }

    .call-btn.start {
      background: var(--green);
      box-shadow: 0 4px 24px var(--green-glow);
    }
    .call-btn.start:hover {
      box-shadow: 0 4px 32px rgba(0,184,148,0.5);
      transform: scale(1.05);
    }

    .call-btn.stop {
      background: var(--red);
      box-shadow: 0 4px 24px var(--red-glow);
    }
    .call-btn.stop:hover {
      box-shadow: 0 4px 32px rgba(225,112,85,0.5);
      transform: scale(1.05);
    }

    .call-btn svg { width: 24px; height: 24px; fill: #fff; }

    .btn-row {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .settings-btn {
      width: 40px; height: 40px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-muted);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.2s, color 0.2s;
    }
    .settings-btn:hover {
      border-color: var(--accent);
      color: var(--accent-light);
    }
    .settings-btn svg { width: 16px; height: 16px; fill: currentColor; }

    /* ── Transcript ── */
    .transcript-box {
      width: 100%;
      max-width: 440px;
      max-height: 180px;
      overflow-y: auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.2rem;
      font-size: 0.82rem;
      line-height: 1.7;
      color: var(--text-muted);
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    .transcript-box:empty::before {
      content: 'Transcript will appear here...';
      color: #3a3a4e;
      font-style: italic;
    }
    .transcript-box .agent { color: var(--green); }
    .transcript-box .user { color: var(--accent-light); }
    .transcript-box .role {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-right: 0.4rem;
    }
    .transcript-line { margin-bottom: 0.4rem; }

    /* ── Connecting spinner ── */
    .connecting-spinner {
      display: none;
      width: 20px; height: 20px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Footer ── */
    .footer {
      position: fixed;
      bottom: 1.2rem;
      font-size: 0.7rem;
      color: #3a3a4e;
      font-family: 'Space Mono', monospace;
      letter-spacing: 0.05em;
    }
    .footer a { color: var(--accent); text-decoration: none; }
    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div class="ambient"></div>

  <div class="container">

    <!-- ═══ SETUP PANEL ═══ -->
    <div class="setup-panel" id="setupPanel">
      <h2>// Configure Agent</h2>

      <div class="field">
        <label for="webhookUrl">Webhook Proxy URL</label>
        <input type="text" id="webhookUrl" placeholder="https://your-n8n.example.com/webhook/retell-proxy" autocomplete="off" />
        <div class="hint">Your n8n webhook URL that proxies the Retell API</div>
      </div>

      <div class="field">
        <label for="agentId">Agent ID</label>
        <input type="text" id="agentId" placeholder="agent_xxxxxxxxxxxxxxxx" autocomplete="off" />
        <div class="hint">The voice agent you want to connect to</div>
      </div>

      <button class="save-btn" id="saveBtn" onclick="saveConfig()">Connect to Agent</button>
    </div>

    <!-- ═══ CALL INTERFACE ═══ -->
    <div class="call-interface hidden" id="callInterface">

      <div class="agent-info">
        <h1>Talk to Us</h1>
        <p>Speak directly with our AI agent</p>
      </div>

      <div class="orb-container">
        <div class="orb-pulse" id="orbPulse"></div>
        <div class="orb-ring" id="orbRing">
          <div style="display:flex;align-items:center;justify-content:center;height:100%;">
            <div class="visualizer" id="visualizer">
              <div class="bar"></div>
              <div class="bar"></div>
              <div class="bar"></div>
              <div class="bar"></div>
              <div class="bar"></div>
              <div class="bar"></div>
              <div class="bar"></div>
              <div class="bar"></div>
              <div class="bar"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="status" id="statusArea">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">Ready to connect</span>
      </div>

      <div class="btn-row">
        <button class="settings-btn" onclick="showSetup()" title="Settings">
          <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.49.49 0 00-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 00-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6A3.6 3.6 0 1112 8.4a3.6 3.6 0 010 7.2z"/></svg>
        </button>

        <button class="call-btn start" id="callBtn" onclick="toggleCall()">
          <!-- Mic icon -->
          <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
          <div class="connecting-spinner" id="spinner"></div>
        </button>

        <div style="width:40px"></div> <!-- spacer for symmetry -->
      </div>

      <div class="transcript-box" id="transcript"></div>
    </div>
  </div>

  <div class="footer">
    Powered by <a href="https://www.retellai.com" target="_blank">Retell AI</a> · Built by <a href="https://awesomate.com.au" target="_blank">Awesomate</a>
  </div>

  <script>
    // ─── State ───
    let retellWebClient = null;
    let isCallActive = false;
    let config = { webhookUrl: '', agentId: '' };

    // ─── Elements ───
    const setupPanel   = document.getElementById('setupPanel');
    const callInterface = document.getElementById('callInterface');
    const callBtn      = document.getElementById('callBtn');
    const statusDot    = document.getElementById('statusDot');
    const statusText   = document.getElementById('statusText');
    const orbRing      = document.getElementById('orbRing');
    const orbPulse     = document.getElementById('orbPulse');
    const visualizer   = document.getElementById('visualizer');
    const transcript   = document.getElementById('transcript');
    const spinner      = document.getElementById('spinner');

    // ─── Load saved config ───
    (function init() {
      const saved = sessionStorage.getItem('retell_config');
      if (saved) {
        config = JSON.parse(saved);
        document.getElementById('webhookUrl').value = config.webhookUrl;
        document.getElementById('agentId').value = config.agentId;
        if (config.webhookUrl && config.agentId) {
          showCallInterface();
        }
      }
    })();

    function saveConfig() {
      config.webhookUrl = document.getElementById('webhookUrl').value.trim();
      config.agentId = document.getElementById('agentId').value.trim();
      if (!config.webhookUrl || !config.agentId) return;
      sessionStorage.setItem('retell_config', JSON.stringify(config));
      showCallInterface();
    }

    function showCallInterface() {
      setupPanel.classList.add('hidden');
      callInterface.classList.remove('hidden');
    }

    function showSetup() {
      if (isCallActive) return;
      callInterface.classList.add('hidden');
      setupPanel.classList.remove('hidden');
    }

    // ─── Retell Web Call ───
    async function toggleCall() {
      if (isCallActive) {
        stopCall();
      } else {
        await startCall();
      }
    }

    async function startCall() {
      setStatus('connecting', 'Connecting...');
      callBtn.style.pointerEvents = 'none';
      spinner.style.display = 'block';
      callBtn.querySelector('svg').style.display = 'none';

      try {
        // 1. Create web call via n8n webhook proxy (API key stays server-side)
        const res = await fetch(config.webhookUrl, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ agent_id: config.agentId }),
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.message || `API error ${res.status}`);
        }

        const data = await res.json();

        // 2. Initialize Retell Web Client
        if (!window.RetellWebClient) {
          throw new Error('Retell SDK not loaded. Check the script tag.');
        }
        retellWebClient = new window.RetellWebClient();

        // 3. Set up event listeners
        retellWebClient.on('call_started', () => {
          isCallActive = true;
          setStatus('live', 'Connected — speak now');
          callBtn.classList.remove('start');
          callBtn.classList.add('stop');
          callBtn.querySelector('svg').innerHTML = '<rect x="6" y="6" width="12" height="12" rx="1"/>';
          orbRing.classList.add('active');
          orbPulse.classList.add('active');
        });

        retellWebClient.on('call_ended', () => {
          endCallUI();
        });

        retellWebClient.on('agent_start_talking', () => {
          visualizer.classList.add('agent-talking');
          setStatus('live', 'Agent is speaking...');
        });

        retellWebClient.on('agent_stop_talking', () => {
          visualizer.classList.remove('agent-talking');
          setStatus('live', 'Listening...');
        });

        retellWebClient.on('update', (update) => {
          if (update.transcript) {
            renderTranscript(update.transcript);
          }
        });

        retellWebClient.on('error', (error) => {
          console.error('Retell error:', error);
          setStatus('error', 'Error occurred');
          endCallUI();
        });

        // 4. Start the call
        await retellWebClient.startCall({
          accessToken: data.access_token,
          sampleRate: 24000,
        });

      } catch (err) {
        console.error('Failed to start call:', err);
        setStatus('error', `Failed: ${err.message}`);
        endCallUI();
      }
    }

    function stopCall() {
      if (retellWebClient) {
        retellWebClient.stopCall();
      }
      endCallUI();
    }

    function endCallUI() {
      isCallActive = false;
      callBtn.style.pointerEvents = '';
      spinner.style.display = 'none';
      callBtn.querySelector('svg').style.display = '';
      callBtn.classList.remove('stop');
      callBtn.classList.add('start');
      callBtn.querySelector('svg').innerHTML = '<path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>';
      orbRing.classList.remove('active');
      orbPulse.classList.remove('active');
      visualizer.classList.remove('agent-talking');
      setStatus('idle', 'Call ended');
      setTimeout(() => setStatus('idle', 'Ready to connect'), 3000);
    }

    function setStatus(state, text) {
      statusText.textContent = text;
      statusDot.className = 'status-dot';
      if (state === 'live') statusDot.classList.add('live');
    }

    function renderTranscript(transcriptArr) {
      // Retell sends last 5 utterances as array of {role, content}
      if (!Array.isArray(transcriptArr)) return;

      transcript.innerHTML = transcriptArr.map(t => {
        const cls = t.role === 'agent' ? 'agent' : 'user';
        const label = t.role === 'agent' ? 'Agent' : 'You';
        return `<div class="transcript-line"><span class="role ${cls}">${label}</span>${escapeHtml(t.content)}</div>`;
      }).join('');

      transcript.scrollTop = transcript.scrollHeight;
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // Enter key on inputs
    document.getElementById('agentId').addEventListener('keydown', e => {
      if (e.key === 'Enter') saveConfig();
    });
  </script>
</body>
</html>
